trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

variables:
  DB_PASSWORD: 'Your_strong_password123!'
  SQL_CONTAINER: 'wonderland-sql'
  SQLCMD: '/opt/mssql-tools18/bin/sqlcmd'

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: 'Use Node.js 24'
    inputs:
      versionSpec: '24.x'

  - script: |
      docker run -e "ACCEPT_EULA=Y" \
        -e "MSSQL_SA_PASSWORD=$(DB_PASSWORD)" \
        -e "MSSQL_PID=Developer" \
        -e "MSSQL_AGENT_ENABLED=true" \
        -p 1433:1433 \
        --name $(SQL_CONTAINER) \
        -d mcr.microsoft.com/mssql/server:2022-latest

      echo "Waiting for SQL Server..."
      for i in {1..60}; do
        docker exec $(SQL_CONTAINER) $(SQLCMD) -S localhost -U sa -P "$(DB_PASSWORD)" -C -Q "SELECT 1" && break
        echo "SQL Server not ready yet..."
        sleep 5
      done
    displayName: 'Start SQL Server container'

  - script: |
      docker exec $(SQL_CONTAINER) $(SQLCMD) -S localhost -U sa -P "$(DB_PASSWORD)" -C -Q "IF DB_ID('WonderlandDB') IS NULL CREATE DATABASE WonderlandDB;"
    displayName: 'Create WonderlandDB'

  - script: |
      echo "Copying SQL scripts into SQL container..."
      docker cp backend/sql/. $(SQL_CONTAINER):/tmp/sql

      echo "Running SQL scripts..."

      # Run all SQL files except Iteration 11.1 first.
      # Iteration 11.1 must run after Iteration 11 because it modifies the audit approach.
      for file in $(find backend/sql -maxdepth 1 -name "*.sql" ! -name "iteration-11-1-cdc-booking-audit-content-trigger.sql" | sort -V); do
        filename=$(basename "$file")
        echo "Running $filename"
        docker exec $(SQL_CONTAINER) $(SQLCMD) -S localhost -U sa -P "$(DB_PASSWORD)" -C -d WonderlandDB -i "/tmp/sql/$filename"
      done

      if [ -f "backend/sql/iteration-11-1-cdc-booking-audit-content-trigger.sql" ]; then
        echo "Running iteration-11-1-cdc-booking-audit-content-trigger.sql last"
        docker exec $(SQL_CONTAINER) $(SQLCMD) -S localhost -U sa -P "$(DB_PASSWORD)" -C -d WonderlandDB -i "/tmp/sql/iteration-11-1-cdc-booking-audit-content-trigger.sql"
      fi
    displayName: 'Run SQL migrations'

  - script: |
      echo "Running rides family friendly schema migration explicitly..."
      echo "Files available in /tmp/sql:"
      docker exec $(SQL_CONTAINER) ls -la /tmp/sql | package "family" || true

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -i "/tmp/sql/iteration-3-1-rides-family-friendly-schema.sql"

      echo "Checking ride eligibility columns after explicit migration..."

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -Q "
        SELECT
          'dbo.Rides' AS TableName,
          COL_LENGTH('dbo.Rides', 'IsFamilyFriendly') AS IsFamilyFriendlyColumn,
          COL_LENGTH('dbo.Rides', 'MinimumAgeYears') AS MinimumAgeYearsColumn,
          COL_LENGTH('dbo.Rides', 'RequiresAdultSupervision') AS RequiresAdultSupervisionColumn;

        SELECT
          RideId,
          Name,
          IsActive,
          IsFamilyFriendly,
          MinimumAgeYears,
          RequiresAdultSupervision
        FROM dbo.Rides
        ORDER BY RideId;
        "
    displayName: 'Run rides family friendly schema migration explicitly'

  - script: |
      echo "Running accommodations eligibility schema migration explicitly..."
      echo "Files available in /tmp/sql:"
      docker exec $(SQL_CONTAINER) ls -la /tmp/sql | grep "accommodations" || true

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -i "/tmp/sql/iteration-3-2-accommodations-eligibility-schema.sql"

      echo "Checking accommodation eligibility columns after explicit migration..."

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -Q "
        SELECT
          'dbo.Accommodations' AS TableName,
          COL_LENGTH('dbo.Accommodations', 'IsFamilyFriendly') AS IsFamilyFriendlyColumn,
          COL_LENGTH('dbo.Accommodations', 'MinimumLeadGuestAgeYears') AS MinimumLeadGuestAgeYearsColumn;

        SELECT
          AccommodationId,
          Name,
          IsActive,
          IsFamilyFriendly,
          MinimumLeadGuestAgeYears
        FROM dbo.Accommodations
        ORDER BY AccommodationId;
        "
    displayName: 'Run accommodations eligibility schema migration explicitly'

  - script: |
      echo "Running content approval schema migration explicitly..."
      echo "Files available in /tmp/sql:"
      docker exec $(SQL_CONTAINER) ls -la /tmp/sql | grep "iteration-3-7" || true

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -i "/tmp/sql/iteration-3-7-content-approval-schema.sql"

      echo "Checking content approval columns after explicit migration..."

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -Q "
        SELECT
          'dbo.Rides' AS TableName,
          COL_LENGTH('dbo.Rides', 'ApprovalStatus') AS ApprovalStatusColumn,
          COL_LENGTH('dbo.Rides', 'SubmittedByUserId') AS SubmittedByUserIdColumn,
          COL_LENGTH('dbo.Rides', 'ReviewedByUserId') AS ReviewedByUserIdColumn;

        SELECT
          'dbo.Accommodations' AS TableName,
          COL_LENGTH('dbo.Accommodations', 'ApprovalStatus') AS ApprovalStatusColumn,
          COL_LENGTH('dbo.Accommodations', 'SubmittedByUserId') AS SubmittedByUserIdColumn,
          COL_LENGTH('dbo.Accommodations', 'ReviewedByUserId') AS ReviewedByUserIdColumn;
        "
    displayName: 'Run content approval schema migration explicitly'

  - script: |
      echo "Running users employee link schema migration explicitly..."
      echo "Files available in /tmp/sql:"
      docker exec $(SQL_CONTAINER) ls -la /tmp/sql | grep "users-employee" || true

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -i "/tmp/sql/iteration-3-5-users-employee-link-schema.sql"

      echo "Checking Users.EmployeeId column after explicit migration..."

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -Q "
        SELECT
          'dbo.Users' AS TableName,
          COL_LENGTH('dbo.Users', 'EmployeeId') AS EmployeeIdColumn;
        "
    displayName: 'Run users employee link schema migration explicitly'

  - script: |
      echo "Running users DateOfBirth schema migration explicitly..."
      echo "Files available in /tmp/sql:"
      docker exec $(SQL_CONTAINER) ls -la /tmp/sql | grep "dateofbirth" || true

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -i "/tmp/sql/iteration-3-5-users-dateofbirth-schema.sql"

      echo "Checking Users.DateOfBirth column after explicit migration..."

      docker exec $(SQL_CONTAINER) $(SQLCMD) \
        -b \
        -S localhost \
        -U sa \
        -P "$(DB_PASSWORD)" \
        -C \
        -d WonderlandDB \
        -Q "
        SELECT
          'dbo.Users' AS TableName,
          COL_LENGTH('dbo.Users', 'DateOfBirth') AS DateOfBirthColumn;
        "
    displayName: 'Run users DateOfBirth schema migration explicitly'

  - script: |
      cat > backend/.env <<EOF
      NODE_ENV=test
      PORT=5010
      FRONTEND_URL=http://localhost:5173
      JWT_SECRET=azure-devops-ci-wonderland-secret
      ENABLE_TEST_SUPPORT=true

      DB_SERVER=localhost
      DB_DATABASE=WonderlandDB
      DB_USER=sa
      DB_PASSWORD=$(DB_PASSWORD)
      DB_ENCRYPT=false
      DB_TRUST_SERVER_CERTIFICATE=true
      EOF

      echo "Created backend/.env for Azure DevOps CI"
    displayName: 'Create backend CI environment file'

  - script: |
      echo "Checking WonderlandDB seed data..."

      docker exec $(SQL_CONTAINER) $(SQLCMD) -S localhost -U sa -P "$(DB_PASSWORD)" -C -d WonderlandDB -Q "
      SELECT 'Users' AS TableName, COUNT(*) AS TotalRows FROM dbo.Users
      UNION ALL
      SELECT 'Employees', COUNT(*) FROM dbo.Employees
      UNION ALL
      SELECT 'Roles', COUNT(*) FROM dbo.Roles
      UNION ALL
      SELECT 'Rides', COUNT(*) FROM dbo.Rides
      UNION ALL
      SELECT 'Accommodations', COUNT(*) FROM dbo.Accommodations
      UNION ALL
      SELECT 'Bookings', COUNT(*) FROM dbo.Bookings;

      SELECT
        'dbo.Rides' AS TableName,
        COL_LENGTH('dbo.Rides', 'IsFamilyFriendly') AS IsFamilyFriendlyColumn,
        COL_LENGTH('dbo.Rides', 'MinimumAgeYears') AS MinimumAgeYearsColumn,
        COL_LENGTH('dbo.Rides', 'RequiresAdultSupervision') AS RequiresAdultSupervisionColumn,
        COL_LENGTH('dbo.Rides', 'ApprovalStatus') AS ApprovalStatusColumn,
        COL_LENGTH('dbo.Rides', 'SubmittedByUserId') AS SubmittedByUserIdColumn,
        COL_LENGTH('dbo.Rides', 'ReviewedByUserId') AS ReviewedByUserIdColumn;

      SELECT
        'dbo.Accommodations' AS TableName,
        COL_LENGTH('dbo.Accommodations', 'IsFamilyFriendly') AS IsFamilyFriendlyColumn,
        COL_LENGTH('dbo.Accommodations', 'MinimumLeadGuestAgeYears') AS MinimumLeadGuestAgeYearsColumn,
        COL_LENGTH('dbo.Accommodations', 'ApprovalStatus') AS ApprovalStatusColumn,
        COL_LENGTH('dbo.Accommodations', 'SubmittedByUserId') AS SubmittedByUserIdColumn,
        COL_LENGTH('dbo.Accommodations', 'ReviewedByUserId') AS ReviewedByUserIdColumn;

      SELECT TOP 10
        RideId,
        Name,
        IsActive,
        IsFamilyFriendly,
        MinimumAgeYears,
        RequiresAdultSupervision,
        ApprovalStatus
      FROM dbo.Rides
      ORDER BY RideId;

      SELECT TOP 10
        AccommodationId,
        Name,
        IsActive,
        IsFamilyFriendly,
        MinimumLeadGuestAgeYears,
        ApprovalStatus
      FROM dbo.Accommodations
      ORDER BY AccommodationId;
      "
    displayName: 'Verify WonderlandDB seed data'

  - script: |
      npm ci
      npm ci --prefix backend
      npm ci --prefix frontend
    displayName: 'Install dependencies'

  - script: |
      echo "Starting backend for API smoke checks..."
      npm run dev --prefix backend > backend-ci.log 2>&1 &

      echo "Waiting for backend health endpoint..."
      for i in {1..30}; do
        curl -sS http://localhost:5010/api/health && break
        echo "Backend not ready yet..."
        sleep 3
      done

      echo ""
      echo "Checking /api/rides response..."
      curl -i http://localhost:5010/api/rides || true

      echo ""
      echo "Checking /api/accommodations response..."
      curl -i http://localhost:5010/api/accommodations || true

      echo ""
      echo "Checking /api/auth/register response..."
      EMAIL="azure.smoke.${BUILD_BUILDID}.${RANDOM}@wonderland.local"

      curl -i -X POST http://localhost:5010/api/auth/register \
        -H "Content-Type: application/json" \
        -d "{
          \"accountType\": \"Guest\",
          \"firstName\": \"Azure\",
          \"lastName\": \"Smoke\",
          \"email\": \"${EMAIL}\",
          \"dateOfBirth\": \"1992-04-12\",
          \"password\": \"Password123!\"
        }" || true

      echo ""
      echo "Checking guest profile API response..."
      PROFILE_EMAIL="azure.profile.${BUILD_BUILDID}.${RANDOM}@wonderland.local"

      PROFILE_REGISTER_RESPONSE=$(curl -sS -X POST http://localhost:5010/api/auth/register \
        -H "Content-Type: application/json" \
        -d "{
          \"accountType\": \"Guest\",
          \"firstName\": \"Azure\",
          \"lastName\": \"Profile\",
          \"email\": \"${PROFILE_EMAIL}\",
          \"dateOfBirth\": \"1992-04-12\",
          \"password\": \"Password123!\"
        }")

      echo "$PROFILE_REGISTER_RESPONSE"

      PROFILE_TOKEN=$(node -e "const data = JSON.parse(process.argv[1]); console.log(data.token || '')" "$PROFILE_REGISTER_RESPONSE")

      curl -i http://localhost:5010/api/profile/me \
        -H "Authorization: Bearer ${PROFILE_TOKEN}" || true

      echo ""
      echo "Checking Admin employee registration response..."

      curl -i -X POST http://localhost:5010/api/auth/register \
        -H "Content-Type: application/json" \
        -d "{
          \"accountType\": \"Admin\",
          \"firstName\": \"Azure\",
          \"lastName\": \"AdminSmoke\",
          \"email\": \"visibility.admin@wonderland.local\",
          \"dateOfBirth\": \"1986-03-03\",
          \"password\": \"Password123!\"
        }" || true

      echo ""
      echo "Checking Manager employee registration response..."

      curl -i -X POST http://localhost:5010/api/auth/register \
        -H "Content-Type: application/json" \
        -d "{
          \"accountType\": \"Manager\",
          \"firstName\": \"Azure\",
          \"lastName\": \"ManagerSmoke\",
          \"email\": \"visibility.manager@wonderland.local\",
          \"dateOfBirth\": \"1989-08-08\",
          \"password\": \"Password123!\"
        }" || true

      echo ""
      echo "Backend log output:"
      cat backend-ci.log
    displayName: 'Smoke test backend API responses'

  - script: |
      npx playwright install --with-deps chromium
    workingDirectory: frontend
    displayName: 'Install Playwright browsers'

  - script: |
      npm run test:e2e
    displayName: 'Run Playwright tests'

  - task: PublishPipelineArtifact@1
    condition: always()
    displayName: 'Publish Playwright HTML report'
    inputs:
      targetPath: 'frontend/playwright-report'
      artifact: 'playwright-report'
      publishLocation: 'pipeline'

  - task: PublishPipelineArtifact@1
    condition: always()
    displayName: 'Publish Playwright test results'
    inputs:
      targetPath: 'frontend/test-results'
      artifact: 'playwright-test-results'
      publishLocation: 'pipeline'
